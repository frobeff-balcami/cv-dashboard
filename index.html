<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2127;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0ee;
    --text2: #8a8f9c;
    --text3: #555b68;
    --accent: #c8f04a;
    --accent2: #7f6af8;
    --green: #3ecf8e;
    --amber: #f5a623;
    --red: #e25c5c;
    --blue: #5b9cf6;
    --r: 10px;
    --r-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* LAYOUT */
  .app { display: flex; min-height: 100vh; }
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow: hidden;
  }
  .main { flex: 1; overflow-y: auto; padding: 2rem; min-width: 0; }

  /* SIDEBAR */
  .sidebar-header {
    padding: 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--accent);
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .sidebar-subtitle { font-size: 11px; color: var(--text3); margin-top: 4px; letter-spacing: 0.05em; text-transform: uppercase; }

  .sync-status {
    margin: 1rem 1.5rem 0;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text3);
  }
  .sync-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .sidebar-filters { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); }
  .filter-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .filter-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--r-sm);
    color: var(--text);
    padding: 8px 12px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    margin-bottom: 8px;
    transition: border-color 0.2s;
  }
  .filter-input:focus { border-color: var(--accent2); }
  .filter-input option { background: var(--surface2); }

  .candidates-list {
    flex: 1;
    overflow-y: auto;
    padding: 0.75rem;
  }
  .candidates-list::-webkit-scrollbar { width: 4px; }
  .candidates-list::-webkit-scrollbar-track { background: transparent; }
  .candidates-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .candidate-item {
    padding: 10px 12px;
    border-radius: var(--r-sm);
    cursor: pointer;
    margin-bottom: 4px;
    border: 1px solid transparent;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .candidate-item:hover { background: var(--surface2); border-color: var(--border); }
  .candidate-item.active { background: var(--surface2); border-color: var(--accent2); }
  .candidate-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; flex-shrink: 0;
  }
  .candidate-info { min-width: 0; flex: 1; }
  .candidate-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .candidate-role { font-size: 11px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .score-badge {
    font-size: 12px; font-weight: 600;
    padding: 2px 7px; border-radius: 20px;
    flex-shrink: 0;
  }

  /* MAIN */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .top-bar-title {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    letter-spacing: -0.5px;
  }
  .refresh-btn {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--r-sm);
    color: var(--text2);
    padding: 7px 14px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.15s;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 1.1rem 1.25rem;
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .stat-card.green::before { background: var(--green); }
  .stat-card.amber::before { background: var(--amber); }
  .stat-card.blue::before { background: var(--blue); }
  .stat-card.purple::before { background: var(--accent2); }
  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-value { font-size: 26px; font-weight: 600; line-height: 1; }
  .stat-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

  /* CONTENT AREA */
  .content-grid { display: grid; grid-template-columns: 1fr 340px; gap: 1.25rem; }

  /* CANDIDATE DETAIL */
  .detail-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
  }
  .detail-header {
    padding: 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 1rem;
  }
  .detail-avatar {
    width: 52px; height: 52px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 600; flex-shrink: 0;
  }
  .detail-name { font-family: 'DM Serif Display', serif; font-size: 20px; letter-spacing: -0.3px; }
  .detail-meta { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .detail-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .tag {
    font-size: 11px; padding: 3px 10px; border-radius: 20px;
    background: var(--surface2); border: 1px solid var(--border2);
    color: var(--text2);
  }
  .tag.green { background: rgba(62,207,142,0.1); border-color: rgba(62,207,142,0.3); color: var(--green); }
  .tag.amber { background: rgba(245,166,35,0.1); border-color: rgba(245,166,35,0.3); color: var(--amber); }
  .tag.red { background: rgba(226,92,92,0.1); border-color: rgba(226,92,92,0.3); color: var(--red); }
  .tag.blue { background: rgba(91,156,246,0.1); border-color: rgba(91,156,246,0.3); color: var(--blue); }
  .tag.purple { background: rgba(127,106,248,0.1); border-color: rgba(127,106,248,0.3); color: var(--accent2); }

  .detail-section { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); }
  .detail-section:last-child { border-bottom: none; }
  .section-title { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
  .detail-text { font-size: 13px; color: var(--text2); line-height: 1.6; }

  .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .contact-item { font-size: 13px; }
  .contact-key { color: var(--text3); font-size: 11px; margin-bottom: 2px; }
  .contact-val { color: var(--text); }

  /* SKILLS */
  .skill-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .skill-name { font-size: 13px; color: var(--text2); min-width: 90px; }
  .skill-bar { flex: 1; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .skill-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
  .skill-yes { font-size: 11px; font-weight: 600; min-width: 28px; text-align: right; }

  /* EXPERIENCE */
  .exp-item { display: flex; gap: 12px; margin-bottom: 14px; }
  .exp-line { display: flex; flex-direction: column; align-items: center; }
  .exp-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .exp-connector { width: 1px; flex: 1; background: var(--border); margin-top: 4px; }
  .exp-title { font-size: 13px; font-weight: 500; }
  .exp-company { font-size: 12px; color: var(--text3); margin-top: 1px; }

  /* SCORE */
  .score-ring-wrap { display: flex; flex-direction: column; align-items: center; padding: 1.5rem; }
  .score-circle {
    width: 100px; height: 100px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    position: relative;
    margin-bottom: 12px;
  }
  .score-circle svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
  .score-number { font-size: 28px; font-weight: 700; position: relative; z-index: 1; line-height: 1; }
  .score-max { font-size: 11px; color: var(--text3); position: relative; z-index: 1; }
  .nivel-label { font-size: 13px; font-weight: 600; }
  .rec-badge {
    margin-top: 8px;
    font-size: 12px; padding: 5px 16px; border-radius: 20px; font-weight: 500;
  }

  /* RIGHT PANEL */
  .right-panel { display: flex; flex-direction: column; gap: 1.25rem; }

  /* CHART */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 1.25rem;
  }
  .chart-title { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1rem; }
  .bar-chart { display: flex; flex-direction: column; gap: 10px; }
  .bar-chart-row { display: flex; align-items: center; gap: 10px; }
  .bar-chart-label { font-size: 12px; color: var(--text2); width: 90px; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-chart-bar { flex: 1; height: 20px; background: var(--surface2); border-radius: 3px; overflow: hidden; position: relative; }
  .bar-chart-fill { height: 100%; border-radius: 3px; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; font-size: 11px; font-weight: 600; transition: width 0.6s ease; }

  /* KEYWORDS */
  .keywords-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
  .keyword { font-size: 12px; padding: 4px 10px; border-radius: 20px; background: var(--surface2); border: 1px solid var(--border2); color: var(--text2); }

  /* EMPTY STATE */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 300px; color: var(--text3); gap: 8px;
  }
  .empty-icon { font-size: 32px; opacity: 0.3; }

  /* LOADING */
  .loading { display: flex; align-items: center; justify-content: center; height: 200px; color: var(--text3); gap: 10px; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* FORTALEZAS/DEBILIDADES */
  .fod-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  .fod-item { display: flex; gap: 8px; font-size: 13px; color: var(--text2); align-items: flex-start; }
  .fod-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }

  @media (max-width: 1100px) {
    .content-grid { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 700px) {
    .sidebar { display: none; }
    .main { padding: 1rem; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo"><div class="logo-dot"></div>CV Radar</div>
      <div class="sidebar-subtitle">Análisis de candidatos</div>
      <div class="sync-status">
        <div class="sync-dot" id="syncDot"></div>
        <span id="syncText">Conectando…</span>
      </div>
    </div>

    <div class="sidebar-filters">
      <div class="filter-label">Buscar</div>
      <input class="filter-input" type="text" id="searchInput" placeholder="Nombre o skills…">
      <div class="filter-label">Filtrar por nivel</div>
      <select class="filter-input" id="filterNivel">
        <option value="">Todos</option>
        <option value="Alto">Alto</option>
        <option value="Medio">Medio</option>
        <option value="Bajo">Bajo</option>
      </select>
      <div class="filter-label">Recomendación</div>
      <select class="filter-input" id="filterRec">
        <option value="">Todas</option>
        <option value="Avanzar">Avanzar</option>
        <option value="Revisar">Revisar</option>
        <option value="Descartar">Descartar</option>
      </select>
    </div>

    <div class="candidates-list" id="candidatesList">
      <div class="loading"><div class="spinner"></div> Cargando…</div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="top-bar">
      <div class="top-bar-title" id="mainTitle">Dashboard</div>
      <button class="refresh-btn" onclick="loadData()">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 8a7 7 0 1 0 2.5-5.3M1 3v5h5"/>
        </svg>
        Actualizar
      </button>
    </div>

    <!-- STATS -->
    <div class="stats-row" id="statsRow">
      <div class="stat-card green"><div class="stat-label">Total candidatos</div><div class="stat-value" id="statTotal">—</div><div class="stat-sub">cargados en el sheet</div></div>
      <div class="stat-card amber"><div class="stat-label">Score promedio</div><div class="stat-value" id="statAvg">—</div><div class="stat-sub">sobre 100</div></div>
      <div class="stat-card blue"><div class="stat-label">Para avanzar</div><div class="stat-value" id="statAvanzar">—</div><div class="stat-sub">recomendados</div></div>
      <div class="stat-card purple"><div class="stat-label">Top score</div><div class="stat-value" id="statTop">—</div><div class="stat-sub" id="statTopName">—</div></div>
    </div>

    <!-- CONTENT -->
    <div class="content-grid">
      <div id="detailArea">
        <div class="detail-card">
          <div class="empty-state">
            <div class="empty-icon">👤</div>
            <div>Seleccioná un candidato para ver el detalle</div>
          </div>
        </div>
      </div>
      <div class="right-panel" id="rightPanel">
        <div class="chart-card">
          <div class="chart-title">Scores generales</div>
          <div class="bar-chart" id="globalChart"><div class="loading"><div class="spinner"></div></div></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
// ——— CONFIG ———
const SHEET_ID = '1WqrL9neXuUMQnf_-RjYhSEY3rpy99rKnhEMkd1UhvxI';
const API_KEY = 'AIzaSyD8-RfCfpwNJVTh1k-3ynhqfJjCPSHEZkw'; // reemplaza con tu API key de Google
const SHEET_NAME = 'BD';
const REFRESH_MS = 30000; // auto-refresh cada 30 seg

let allCandidates = [];
let selectedIndex = null;

// ——— COLORS ———
const avatarColors = [
  ['#c8f04a22','#c8f04a'],
  ['#7f6af822','#7f6af8'],
  ['#3ecf8e22','#3ecf8e'],
  ['#5b9cf622','#5b9cf6'],
  ['#f5a62322','#f5a623'],
  ['#e25c5c22','#e25c5c'],
];

function avatarColor(i) { return avatarColors[i % avatarColors.length]; }

function initials(name) {
  return (name || '?').split(' ').filter(Boolean).slice(0,2).map(n => n[0].toUpperCase()).join('');
}

function scoreColor(s) {
  s = parseInt(s) || 0;
  if (s >= 80) return '#3ecf8e';
  if (s >= 60) return '#f5a623';
  return '#e25c5c';
}

function recColor(r) {
  if (!r) return '';
  if (r.toLowerCase().includes('avanzar')) return 'green';
  if (r.toLowerCase().includes('revisar')) return 'amber';
  return 'red';
}

// ——— FETCH ———
async function loadData() {
  document.getElementById('syncText').textContent = 'Actualizando…';
  document.getElementById('syncDot').style.background = '#f5a623';

  try {
    // Usamos la exportación CSV pública del sheet (no requiere API key)
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('No se pudo acceder al sheet');
    const text = await res.text();
    allCandidates = parseCSV(text).filter(r => r.Nombre && r.Nombre.trim() !== '' && r.Nombre !== 'Nombre');

    renderSidebar(allCandidates);
    renderStats(allCandidates);
    renderGlobalChart(allCandidates);

    document.getElementById('syncText').textContent = `Sync: ${new Date().toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit'})}`;
    document.getElementById('syncDot').style.background = '#3ecf8e';

    if (selectedIndex !== null && allCandidates[selectedIndex]) {
      renderDetail(allCandidates[selectedIndex], selectedIndex);
    }
  } catch(e) {
    document.getElementById('syncText').textContent = 'Error de conexión';
    document.getElementById('syncDot').style.background = '#e25c5c';
    console.error(e);
  }
}

// ——— CSV PARSER ———
function parseCSV(text) {
  const lines = [];
  let current = '';
  let inQuotes = false;
  const chars = text.split('');
  const rows = [];
  let row = [];

  for (let i = 0; i < chars.length; i++) {
    const c = chars[i];
    if (c === '"') {
      if (inQuotes && chars[i+1] === '"') { current += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if (c === ',' && !inQuotes) {
      row.push(current); current = '';
    } else if ((c === '\n' || c === '\r') && !inQuotes) {
      row.push(current); current = '';
      if (row.some(r => r.trim())) rows.push(row);
      row = [];
      if (c === '\r' && chars[i+1] === '\n') i++;
    } else {
      current += c;
    }
  }
  if (current || row.length) { row.push(current); rows.push(row); }

  const headers = rows[0] || [];
  return rows.slice(1).map(r => {
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = (r[i] || '').trim());
    return obj;
  });
}

// ——— SIDEBAR ———
function renderSidebar(candidates) {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const nivel = document.getElementById('filterNivel').value;
  const rec = document.getElementById('filterRec').value;

  const filtered = candidates.filter(c => {
    const matchSearch = !search || c.Nombre.toLowerCase().includes(search) || (c.Skills||'').toLowerCase().includes(search);
    const matchNivel = !nivel || (c['Nivel Ajuste']||'').toLowerCase() === nivel.toLowerCase();
    const matchRec = !rec || (c.Recomendacion||'').toLowerCase().includes(rec.toLowerCase());
    return matchSearch && matchNivel && matchRec;
  });

  const list = document.getElementById('candidatesList');
  if (!filtered.length) {
    list.innerHTML = '<div style="padding:1rem;color:var(--text3);font-size:13px;text-align:center;">Sin resultados</div>';
    return;
  }

  list.innerHTML = filtered.map((c, i) => {
    const realIdx = candidates.indexOf(c);
    const [bg, fg] = avatarColor(realIdx);
    const score = parseInt(c.SCORE) || 0;
    const sc = scoreColor(score);
    return `
      <div class="candidate-item ${selectedIndex === realIdx ? 'active' : ''}" onclick="selectCandidate(${realIdx})">
        <div class="candidate-avatar" style="background:${bg};color:${fg}">${initials(c.Nombre)}</div>
        <div class="candidate-info">
          <div class="candidate-name">${c.Nombre}</div>
          <div class="candidate-role">${c.Ubicacion || '—'}</div>
        </div>
        <div class="score-badge" style="background:${sc}22;color:${sc}">${score}</div>
      </div>
    `;
  }).join('');
}

document.getElementById('searchInput').addEventListener('input', () => renderSidebar(allCandidates));
document.getElementById('filterNivel').addEventListener('change', () => renderSidebar(allCandidates));
document.getElementById('filterRec').addEventListener('change', () => renderSidebar(allCandidates));

// ——— STATS ———
function renderStats(candidates) {
  const total = candidates.length;
  const scores = candidates.map(c => parseInt(c.SCORE)||0).filter(s=>s>0);
  const avg = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : 0;
  const avanzar = candidates.filter(c => (c.Recomendacion||'').toLowerCase().includes('avanzar')).length;
  const top = candidates.reduce((best, c) => (parseInt(c.SCORE)||0) > (parseInt(best.SCORE)||0) ? c : best, candidates[0] || {});

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statAvg').textContent = avg;
  document.getElementById('statAvanzar').textContent = avanzar;
  document.getElementById('statTop').textContent = parseInt(top.SCORE)||'—';
  document.getElementById('statTopName').textContent = top.Nombre || '—';
  document.getElementById('mainTitle').textContent = 'Dashboard · ' + total + ' candidatos';
}

// ——— GLOBAL CHART ———
function renderGlobalChart(candidates) {
  const sorted = [...candidates].sort((a,b) => (parseInt(b.SCORE)||0) - (parseInt(a.SCORE)||0)).slice(0, 10);
  const chart = document.getElementById('globalChart');
  chart.innerHTML = sorted.map((c, i) => {
    const score = parseInt(c.SCORE)||0;
    const color = scoreColor(score);
    return `
      <div class="bar-chart-row" style="cursor:pointer" onclick="selectCandidate(${candidates.indexOf(c)})">
        <div class="bar-chart-label" title="${c.Nombre}">${c.Nombre.split(' ')[0]}</div>
        <div class="bar-chart-bar">
          <div class="bar-chart-fill" style="width:${score}%;background:${color}22;color:${color}">
            <span>${score}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

// ——— SELECT ———
function selectCandidate(idx) {
  selectedIndex = idx;
  renderSidebar(allCandidates);
  renderDetail(allCandidates[idx], idx);
}

// ——— DETAIL ———
function renderDetail(c, idx) {
  const [bg, fg] = avatarColor(idx);
  const score = parseInt(c.SCORE)||0;
  const sc = scoreColor(score);
  const rec = c.Recomendacion || '';
  const rc = recColor(rec);
  const nivel = c['Nivel Ajuste'] || '';

  // SKILLS check
  const skillKeys = ['Excel','Ingles','odoo','Liderazgo','Ing. Industrial'];
  const skillLabels = ['Excel','Inglés','Odoo','Liderazgo','Ing. Industrial'];
  const skillValues = skillKeys.map(k => (c[k]||'').toLowerCase() === 'sí' || (c[k]||'').toLowerCase() === 'si');

  // Experience parsing
  const expParts = (c.Experiencia||'').split('|').map(s=>s.trim()).filter(Boolean);
  const expHtml = expParts.slice(0,4).map((e, i) => {
    const dotColor = i===0 ? fg : 'var(--text3)';
    return `
      <div class="exp-item">
        <div class="exp-line">
          <div class="exp-dot" style="background:${dotColor}"></div>
          ${i < expParts.length-1 ? '<div class="exp-connector"></div>' : ''}
        </div>
        <div style="padding-bottom:4px">
          <div class="exp-title">${e.split('-')[0]?.trim() || e}</div>
          <div class="exp-company">${e.split('-').slice(1).join('-').trim()}</div>
        </div>
      </div>
    `;
  }).join('');

  // Keywords from Skills field
  const keywords = (c.Skills||'').split(',').map(s=>s.trim()).filter(Boolean).slice(0,15);

  // Fortalezas / Debilidades
  const fortalezas = (c.Fortaleza||'').split('|').map(s=>s.trim()).filter(Boolean);
  const debilidades = (c.Debilidades||'').split('|').map(s=>s.trim()).filter(Boolean);

  // Circumference for SVG ring
  const r = 40, circ = 2 * Math.PI * r;
  const dash = circ - (score/100)*circ;

  document.getElementById('detailArea').innerHTML = `
    <div class="detail-card">
      <div class="detail-header">
        <div class="detail-avatar" style="background:${bg};color:${fg}">${initials(c.Nombre)}</div>
        <div style="flex:1;min-width:0">
          <div class="detail-name">${c.Nombre}</div>
          <div class="detail-meta">${c.Mail || ''} ${c.Telefono && c.Telefono !== '#ERROR!' ? '· '+c.Telefono : ''}</div>
          <div class="detail-meta">${c.Ubicacion || ''}</div>
          <div class="detail-tags" style="margin-top:8px">
            <span class="tag ${rc}">${rec || 'Sin recomendación'}</span>
            <span class="tag" style="background:${sc}22;border-color:${sc}44;color:${sc}">Score ${score}</span>
            ${nivel ? `<span class="tag">Nivel ${nivel}</span>` : ''}
            ${c.Idiomas ? c.Idiomas.split(',').slice(0,3).map(l=>`<span class="tag">${l.trim()}</span>`).join('') : ''}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0">
          <div class="score-circle" style="width:80px;height:80px">
            <svg width="80" height="80" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="${r}" fill="none" stroke="var(--surface2)" stroke-width="8"/>
              <circle cx="50" cy="50" r="${r}" fill="none" stroke="${sc}" stroke-width="8"
                stroke-dasharray="${circ}" stroke-dashoffset="${dash}" stroke-linecap="round"/>
            </svg>
            <div class="score-number" style="font-size:22px;color:${sc}">${score}</div>
          </div>
          <div class="nivel-label" style="color:${sc};font-size:12px">${nivel}</div>
        </div>
      </div>

      <div class="detail-section">
        <div class="section-title">Perfil</div>
        <div class="detail-text">${c['Resumen Perfil'] || '—'}</div>
      </div>

      <div class="detail-section">
        <div class="section-title">Competencias clave</div>
        ${skillLabels.map((label, i) => {
          const has = skillValues[i];
          return `
            <div class="skill-row">
              <div class="skill-name">${label}</div>
              <div class="skill-bar">
                <div class="skill-fill" style="width:${has?100:0}%;background:${has?'#3ecf8e':'#e25c5c'}"></div>
              </div>
              <div class="skill-yes" style="color:${has?'#3ecf8e':'#e25c5c'}">${has?'Sí':'No'}</div>
            </div>
          `;
        }).join('')}
      </div>

      ${expHtml ? `
      <div class="detail-section">
        <div class="section-title">Experiencia</div>
        ${expHtml}
      </div>` : ''}

      ${c.Educacion ? `
      <div class="detail-section">
        <div class="section-title">Educación</div>
        <div class="detail-text">${c.Educacion}</div>
      </div>` : ''}

      ${keywords.length ? `
      <div class="detail-section">
        <div class="section-title">Skills</div>
        <div class="keywords-wrap">
          ${keywords.map(k=>`<span class="keyword">${k}</span>`).join('')}
        </div>
      </div>` : ''}

      ${fortalezas.length || debilidades.length ? `
      <div class="detail-section">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
          <div>
            <div class="section-title">Fortalezas</div>
            <ul class="fod-list">
              ${fortalezas.slice(0,4).map(f=>`<li class="fod-item"><span class="fod-icon" style="color:#3ecf8e">+</span><span>${f}</span></li>`).join('')}
            </ul>
          </div>
          <div>
            <div class="section-title">Debilidades</div>
            <ul class="fod-list">
              ${debilidades.slice(0,4).map(d=>`<li class="fod-item"><span class="fod-icon" style="color:#e25c5c">−</span><span>${d}</span></li>`).join('')}
            </ul>
          </div>
        </div>
      </div>` : ''}

      ${c['Justificacion '] || c.Justificacion ? `
      <div class="detail-section">
        <div class="section-title">Justificación</div>
        <div class="detail-text">${c['Justificacion '] || c.Justificacion}</div>
      </div>` : ''}
    </div>
  `;
}

// ——— INIT ———
loadData();
setInterval(loadData, REFRESH_MS);
</script>
</body>
</html>
